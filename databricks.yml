bundle:
  name: hilton-kb-chat

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID
  serving_endpoint_name:
    description: Serving endpoint name

sync:
  include:
    - dist/**
    - client/dist/**
  exclude:
    - node_modules/**
    - .databricks/**
    - data/**
    - tests/**
    - scripts/**
    - playwright-report/**
    - test-results/**
    - .smoke-test-videos/**

resources:
  apps:
    app:
      name: "hilton-kb-chat"
      description: "HGV Sales Compensation Assistant — governed comp semantic layer + LLM on Model Serving"
      user_api_scopes:
        - sql
        - model-serving
      source_code_path: ./
      config:
        command:
          - node
          - dist/server.js
        env:
          - name: NODE_ENV
            value: production
          - name: FLASK_RUN_HOST
            value: "0.0.0.0"
          - name: DATABRICKS_WAREHOUSE_ID
            value_from: sql-warehouse
          - name: DATABRICKS_SERVING_ENDPOINT_NAME
            value_from: serving-endpoint
          - name: LLM_ALLOW_FALLBACK
            value: "false"
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: serving-endpoint
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY

targets:
  default:
    default: true
    workspace:
      host: https://dbc-60a40685-ea2b.cloud.databricks.com

    variables:
      sql_warehouse_id: 0df692712c9a2f9a
      serving_endpoint_name: databricks-claude-sonnet-4-6
