# Builds the Databricks App deploy zip for edw_dev_hris (VDI upload).
# Artifact: Actions tab → latest run → hgv-comp-app-edw_dev_hris
# Tagged releases (v*): zip is also attached to the GitHub Release.

name: Build EDW VDI deploy zip

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: edw-vdi-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run package:edw-vdi

      - name: Upload deploy zip (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: hgv-comp-app-edw_dev_hris
          path: build/hgv-comp-app-edw_dev_hris.zip
          retention-days: 90
          if-no-files-found: error

  release:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download deploy zip
        uses: actions/download-artifact@v4
        with:
          name: hgv-comp-app-edw_dev_hris

      - name: Attach zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hgv-comp-app-edw_dev_hris.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
